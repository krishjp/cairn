version: '3.8'

services:
  db:
    image: kartoza/postgis:18-3.6--v2026.03.24
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cairn_user}
      POSTGRES_PASS: ${POSTGRES_PASSWORD:-cairn_password}
      POSTGRES_DBNAME: ${POSTGRES_DB:-cairn_db}
      ALLOW_IP_RANGE: 0.0.0.0/0
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cairn_user} -d ${POSTGRES_DB:-cairn_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cairn_user}:${POSTGRES_PASSWORD:-cairn_password}@db:5432/${POSTGRES_DB:-cairn_db}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    command:
      - "http"
      - "backend:8000"
    depends_on:
      - backend

volumes:
  postgres_data:
